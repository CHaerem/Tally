name: Fetch Stock Data

on:
  schedule:
    # Post-close update: 5:00 PM CET (16:00 UTC) on weekdays
    - cron: '0 16 * * 1-5'
    # Weekly full update with dividends: Sunday 2:00 AM CET (01:00 UTC)
    - cron: '0 1 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Update mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine update mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [[ "$(date -u +%u)" -eq 7 ]]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Fetch stock data from Yahoo Finance
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          echo "Mode: $MODE"
          if [[ "$MODE" == "full" ]]; then
            node scripts/fetch-stock-data-v2.js --full-update
          else
            node scripts/fetch-stock-data-v2.js
          fi

      - name: Commit and push changes
        run: |
          git add -A public/data/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          CHANGED=$(git diff --cached --name-only | wc -l)
          TIME=$(date -u +'%Y-%m-%d %H:%M UTC')
          MODE="${{ steps.mode.outputs.mode }}"

          if [[ "$MODE" == "full" ]]; then
            git commit -m "Full stock & fund data update ($CHANGED files) - $TIME"
          else
            git commit -m "Daily stock & fund data update ($CHANGED files) - $TIME"
          fi

          git push
